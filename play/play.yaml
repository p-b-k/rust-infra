version: "3"

volumes:
  cp_sample_data:
    name: sample
    driver: local

network:
  cplane:
    driver: bridge

services:
  server:
    name: cp
    image: cplane-base
    network: cplane
    ports:
      - "7201:8000"
      - "3300:3306"
    volumes:
      - cp_sample_data:/var/lib/mysql:Z
    environment:
      - "SLEEP_SECS=5"
      - "RUST_LOG:debug"
  interface:
    name: ui
    image: cplane-ui
    network: cplane
    ports:
      - "7200:8000"
    environment:
      - "RUST_LOG=debug"
