<h2>Manage the available services and versions</h2>
<div id="prod-table">
  <script type="text/javascript">
    populateROTable('prod-table', '/pass/page/services/service-table/head', '/pass/page/services/service-table/body'); 
  </script>
</div>

<!-- Create a hidden, popup panel -->
<div id="service-panel" style="visibility:hidden">
  <h2 id="service-panel-header">Service Information</h2>
  <table id="service-detail-table">
    <tr><td>Id</td><td><span id="service-panel-id"/></tr>
    <tr><td>Name</td><td><span id="service-panel-name"/></tr>
    <tr><td>Version</td><td><span id="service-panel-version"/></tr>
  </table>
</div>
