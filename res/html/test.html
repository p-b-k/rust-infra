<!doctype html>
<!-- -->
<html>
  <head>
    <title>Testing Loading Data</title>

    <!-- Local CSS style -->
    <link rel="stylesheet" href="/static/css/colors.css"/>
    <link rel="stylesheet" href="/static/css/test.css"/>
    <link rel="stylesheet" href="/static/css/table.css"/>

    <!-- Javascript File -->
    <script src="/static/js/core.js"></script>
    <script src="/static/js/table.js"></script>

    <script src="/static/js/test.js"></script>
  </head>

  <body>
    <h1>Testing Rusty Web Services</h1>
    <h3>Loads the data from the DB and uses JS to dynamically write the tables</h3>

    <hr/>

    <h2>This table loads the service table from the database</h2>
    <div id="test-prod-table-top" class="table-control">
      <div class="table-header">Services</div>
      <table id="test-prod-filter" class="search-bar">
        <tr>
          <td><img src="/static/svg/search.svg" height="16" width="16"/></td>
          <td><input/></td>
          <td><img src="/static/svg/copy.svg" height="16" width="16"/></td>
          <td><img src="/static/svg/reload.svg" height="16" width="16"/></td>
        </tr>
      </table>
      <table class="test-prod-table">
        <thead id="test-prod-head"/>
        <tbody id="test-prod-body"/>
        <tfoot id="test-prod-foot"/>
      </table>
    </div>

    <h2>This table loads the product table from the database</h2>
    <div id="test-svc-table-top" class="table-control">
      <div class="table-header">Products</div>
      <table id="test-svc-filter" class="search-bar">
        <tr>
          <td><img src="/static/svg/search.svg" height="16" width="16"/></td>
          <td><input/></td>
          <td><img src="/static/svg/copy.svg" height="16" width="16"/></td>
          <td><img src="/static/svg/reload.svg" height="16" width="16"/></td>
        </tr>
      </table>
      <table class="test-svc-table">
        <thead id="test-svc-head"/>
        <tbody id="test-svc-body"/>
        <tfoot id="test-svc-foot"/>
      </table>
    <div>

    <script type="text/javascript">
      console.log('The file has loaded. Repeat, the file has loaded');

      // Create the product table
      let testProdTableData = {};
      let headProdUrl = '/test/prod/table/head';
      let bodyProdUrl = '/test/prod/table/body';

      populateTable('test-prod-head', 'test-prod-body', headProdUrl, bodyProdUrl, testProdTableData); 

      // Create the service table
      let testSvcTableData = {};
      let headSvcUrl = '/test/svc/table/head';
      let bodySvcUrl = '/test/svc/table/body';

      populateTable('test-svc-head', 'test-svc-body', headSvcUrl, bodySvcUrl, testSvcTableData); 
    </script>
  </body>
</html>
