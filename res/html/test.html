      console.log('The file has loaded. Repeat, the file has loaded');

      // Create the product table
      let testProdTableData = {};
      let headProdUrl = '/test/prod/table/head';
      let bodyProdUrl = '/test/prod/table/body';

      populateTable('test-prod-head', 'test-prod-body', headProdUrl, bodyProdUrl, testProdTableData); 

      // Create the service table
      let testSvcTableData = {};
      let headSvcUrl = '/test/svc/table/head';
      let bodySvcUrl = '/test/svc/table/body';

      populateTable('test-svc-head', 'test-svc-body', headSvcUrl, bodySvcUrl, testSvcTableData);
